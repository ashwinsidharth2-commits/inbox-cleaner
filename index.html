<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" id="theme-meta" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inbox Cleaner">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>Gmail Inbox Cleaner</title>
  <script src="<https://accounts.google.com/gsi/client>" async></script>
  <script src="<https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js>"></script>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { min-height: 100%; overscroll-behavior-y: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif; font-size: 15px; line-height: 1.5; transition: background .2s, color .2s; }
  :root {
    --bg: #f1f5f9; --surf: #ffffff; --surf2: #f8fafc; --bdr: #e2e8f0;
    --txt: #0f172a; --muted: #64748b; --accent: #6366f1; --accent2: #4f46e5;
    --red: #ef4444; --red-bg: #fef2f2; --amber: #f59e0b; --amber-bg: #fffbeb;
    --green: #10b981; --green-bg: #ecfdf5; --blue: #3b82f6; --blue-bg: #eff6ff;
    --sh: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --sh2: 0 4px 16px rgba(0,0,0,.10); --rad: 12px;
    --safe-t: env(safe-area-inset-top,0px); --safe-b: env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"] {
    --bg: #0f172a; --surf: #1e293b; --surf2: #0f172a; --bdr: #334155;
    --txt: #f1f5f9; --muted: #94a3b8; --accent: #818cf8; --accent2: #6366f1;
    --red: #f87171; --red-bg: #1e1015; --amber: #fbbf24; --amber-bg: #1c1507;
    --green: #34d399; --green-bg: #052e16; --blue: #60a5fa; --blue-bg: #0c1a2e;
    --sh: 0 1px 3px rgba(0,0,0,.3); --sh2: 0 4px 24px rgba(0,0,0,.4);
  }
  body { background: var(--bg); color: var(--txt); }
  #app { display: flex; flex-direction: column; min-height: 100dvh; }
  header {
    background: var(--surf); border-bottom: 1px solid var(--bdr);
    padding: calc(14px + var(--safe-t)) 20px 14px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100; box-shadow: var(--sh);
  }
  .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  .logo-text { font-size: 1rem; font-weight: 700; }
  .logo-text span { color: var(--accent); }
  .acct-select {
    flex: 1; max-width: 260px; padding: 7px 12px;
    background: var(--surf2); border: 1px solid var(--bdr);
    border-radius: 8px; font-size: .85rem; color: var(--txt); cursor: pointer; outline: none;
  }
  .acct-select:focus { border-color: var(--accent); }
  .hdr-actions { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .scan-progress { flex: 1; max-width: 200px; display: none; align-items: center; gap: 8px; font-size: .8rem; color: var(--muted); }
  .scan-progress.visible { display: flex; }
  .scan-bar-wrap { flex: 1; height: 4px; background: var(--bdr); border-radius: 2px; overflow: hidden; }
  .scan-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; width: 0%; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-size: .85rem; font-weight: 600; transition: all .15s; min-height: 38px; white-space: nowrap;
  }
  .btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surf2); color: var(--txt); border: 1px solid var(--bdr); }
  .btn-secondary:hover { background: var(--bdr); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: .88; }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { background: var(--bdr); color: var(--txt); }
  .btn-icon { padding: 8px; border-radius: 8px; font-size: 1rem; }
  .btn-sm { padding: 6px 12px; font-size: .8rem; min-height: 32px; }
  main { flex: 1; padding: 20px; }
  .container { max-width: 1100px; margin: 0 auto; }
  .setup-card {
    max-width: 540px; margin: 32px auto;
    background: var(--surf); border-radius: var(--rad); border: 1px solid var(--bdr);
    box-shadow: var(--sh2); overflow: hidden;
  }
  .setup-hero {
    background: linear-gradient(135deg, var(--accent), var(--blue));
    padding: 32px 28px; text-align: center; color: #fff;
  }
  .setup-hero .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .setup-hero h1 { font-size: 1.4rem; font-weight: 700; }
  .setup-hero p { opacity: .85; margin-top: 6px; font-size: .9rem; }
  .setup-body { padding: 28px; }
  .setup-step { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }
  .step-num {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); color: #fff; font-size: .8rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .step-body { font-size: .875rem; padding-top: 4px; }
  .step-body strong { color: var(--txt); }
  code {
    background: var(--surf2); border: 1px solid var(--bdr);
    padding: 1px 6px; border-radius: 4px; font-size: .82em; word-break: break-all;
  }
  .cid-row { display: flex; gap: 8px; margin-top: 20px; }
  .cid-input {
    flex: 1; padding: 10px 14px; background: var(--surf2); color: var(--txt);
    border: 2px solid var(--bdr); border-radius: 8px; font-size: .875rem; outline: none;
    transition: border-color .2s;
  }
  .cid-input:focus { border-color: var(--accent); }
  .empty-state { text-align: center; padding: 60px 24px; }
  .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; }
  .empty-state p { color: var(--muted); margin-bottom: 24px; }
  .scan-prompt {
    background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--rad);
    padding: 40px; text-align: center; box-shadow: var(--sh);
  }
  .scan-prompt h2 { font-size: 1.1rem; margin-bottom: 8px; }
  .scan-prompt p { color: var(--muted); margin-bottom: 24px; font-size: .9rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--rad);
    padding: 18px 20px; box-shadow: var(--sh); cursor: default; transition: box-shadow .2s, transform .2s;
  }
  .stat-card.clickable { cursor: pointer; }
  .stat-card.clickable:hover { box-shadow: var(--sh2); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
  .stat-icon { font-size: 1.4rem; margin-bottom: 8px; }
  .stat-label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .stat-value { font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat-sub { font-size: .78rem; color: var(--muted); margin-top: 4px; }
  .stat-card.danger .stat-value { color: var(--red); }
  .stat-card.warning .stat-value { color: var(--amber); }
  .stat-card.success .stat-value { color: var(--green); }
  .stat-card.accent .stat-value { color: var(--accent); }
  .charts-row { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
  @media (min-width: 800px) { .charts-row { grid-template-columns: 3fr 2fr; } }
  .chart-card { background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--rad); padding: 20px; box-shadow: var(--sh); }
  .chart-title { font-size: .85rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; }
  .chart-wrap { position: relative; }
  .breakdown-list { display: flex; flex-direction: column; gap: 12px; }
  .breakdown-item { display: flex; align-items: center; gap: 10px; }
  .bk-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .bk-label { font-size: .875rem; flex: 1; }
  .bk-count { font-size: .875rem; font-weight: 700; }
  .bk-bar-wrap { height: 6px; background: var(--bdr); border-radius: 3px; margin-top: 4px; overflow: hidden; }
  .bk-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .table-card {
    background: var(--surf); border: 1px solid var(--bdr); border-radius: var(--rad);
    box-shadow: var(--sh); overflow: hidden; margin-bottom: 80px;
  }
  .table-toolbar { padding: 14px 16px; border-bottom: 1px solid var(--bdr); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-tab {
    padding: 5px 12px; border-radius: 20px; font-size: .8rem; font-weight: 600;
    border: 1px solid var(--bdr); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-tab .tab-count { margin-left: 4px; opacity: .75; }
  .search-wrap { flex: 1; min-width: 160px; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; opacity: .45; }
  .search-input { width: 100%; padding: 8px 12px 8px 32px; background: var(--surf2); color: var(--txt); border: 1px solid var(--bdr); border-radius: 8px; font-size: .85rem; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .sort-select { padding: 8px 10px; background: var(--surf2); color: var(--txt); border: 1px solid var(--bdr); border-radius: 8px; font-size: .8rem; outline: none; }
  .sender-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--bdr); transition: background .12s, opacity .3s; }
  .sender-row:last-child { border-bottom: none; }
  .sender-row:hover { background: var(--surf2); }
  .sender-row.fading { opacity: .15; pointer-events: none; }
  .row-cb { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
  .risk-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .risk-dot.spam { background: var(--red); }
  .risk-dot.newsletter { background: var(--amber); }
  .risk-dot.regular { background: var(--green); }
  .sender-info { flex: 1; min-width: 0; }
  .sender-name { font-weight: 600; font-size: .875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sender-addr { font-size: .75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .count-col { flex-shrink: 0; width: 100px; display: none; }
  @media (min-width: 600px) { .count-col { display: block; } }
  .count-bar-wrap { height: 5px; background: var(--bdr); border-radius: 3px; margin-bottom: 3px; overflow: hidden; }
  .count-bar { height: 100%; border-radius: 3px; transition: width .6s ease; }
  .count-num { font-size: .75rem; color: var(--muted); font-weight: 600; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: .72rem; font-weight: 700; flex-shrink: 0; }
  .badge.spam { background: var(--red-bg); color: var(--red); }
  .badge.newsletter { background: var(--amber-bg); color: var(--amber); }
  .badge.regular { display: none; }
  .row-action { flex-shrink: 0; }
  .no-results { text-align: center; padding: 32px; color: var(--muted); font-size: .9rem; }
  #bulk-bar {
    position: fixed; bottom: calc(16px + var(--safe-b)); left: 50%;
    transform: translateX(-50%) translateY(90px);
    background: var(--txt); color: var(--surf);
    padding: 12px 20px; border-radius: 40px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.28);
    z-index: 200; transition: transform .25s cubic-bezier(.34,1.56,.64,1);
    white-space: nowrap; font-size: .875rem;
  }
  #bulk-bar.visible { transform: translateX(-50%) translateY(0); }
  #bulk-bar .bulk-label { font-weight: 600; }
  #bulk-bar .bulk-sub { opacity: .6; font-size: .78rem; }
  #bulk-bar .btn-bulk-trash { background: var(--red); color: #fff; }
  #bulk-bar .btn-bulk-trash:hover { opacity: .88; }
  #bulk-bar .btn-bulk-cancel { background: rgba(255,255,255,.15); color: inherit; }
  #toast {
    position: fixed; bottom: calc(90px + var(--safe-b)); left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #1e293b; color: #f1f5f9;
    padding: 10px 20px; border-radius: 20px; font-size: .875rem;
    z-index: 300; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  [data-theme="dark"] #toast { background: #f1f5f9; color: #0f172a; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--bdr); border-top-color: var(--accent); border-radius: 50%; animation: spin .65s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .divider { height: 1px; background: var(--bdr); margin: 16px 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  select, input { color-scheme: inherit; }
  @media (max-width: 479px) {
    main { padding: 12px; }
    header { padding: calc(10px + var(--safe-t)) 12px 10px; gap: 8px; }
    .logo-text { display: none; }
    .acct-select { max-width: 140px; font-size: .8rem; }
    .stat-value { font-size: 1.5rem; }
    .badge { display: none; }
  }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">&#9993;</div>
      <div class="logo-text">Inbox <span>Cleaner</span></div>
    </div>
    <select class="acct-select" id="acct-select" onchange="App.switchAccount(this.value)">
      <option value="">&#8212; Select account &#8212;</option>
    </select>
    <div class="scan-progress" id="scan-progress">
      <div class="spinner"></div>
      <div style="flex:1">
        <div class="scan-bar-wrap"><div class="scan-bar" id="scan-bar"></div></div>
        <div id="scan-text" style="font-size:.72rem;margin-top:2px">Scanning...</div>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-primary btn-sm" id="scan-btn" onclick="App.scan()" style="display:none">Scan</button>
      <button class="btn btn-secondary btn-sm btn-icon" id="theme-btn" onclick="App.toggleTheme()" title="Toggle dark mode">&#127769;</button>
      <button class="btn btn-secondary btn-sm" id="add-acct-btn" style="display:none" onclick="App.addAccount()">+ Account</button>
    </div>
  </header>
  <main>
    <div class="container" id="main-content"></div>
  </main>
</div>
<div id="bulk-bar">
  <div>
    <div class="bulk-label" id="bulk-label">0 senders selected</div>
    <div class="bulk-sub" id="bulk-sub"></div>
  </div>
  <button class="btn btn-sm btn-bulk-trash" onclick="App.trashSelected()">&#128465; Trash All</button>
  <button class="btn btn-sm btn-bulk-cancel" onclick="App.clearSelection()">Cancel</button>
</div>
<div id="toast"></div>
<script>
'use strict';
const Device = (function() {
  var ua = navigator.userAgent;
  var w = window.innerWidth;
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);
  var isTouch = navigator.maxTouchPoints > 0;
  var isMobile = (isIOS || isAndroid) || (isTouch && w < 768);
  var isTablet = !isMobile && isTouch && w < 1280;
  var type = isMobile ? 'mobile' : isTablet ? 'tablet' : 'desktop';
  document.body.dataset.device = type;
  return { type: type, isMobile: isMobile, isTablet: isTablet, isDesktop: !isMobile && !isTablet, isTouch: isTouch, isIOS: isIOS };
})();

var Store = {
  getClientId: function() { return localStorage.getItem('gcid') || ''; },
  setClientId: function(v) { localStorage.setItem('gcid', v); },
  getAccounts: function() { return JSON.parse(localStorage.getItem('accounts') || '[]'); },
  addAccount: function(e) { var a = Store.getAccounts(); if (a.indexOf(e) === -1) { a.push(e); localStorage.setItem('accounts', JSON.stringify(a)); } },
  removeAccount: function(e) { localStorage.setItem('accounts', JSON.stringify(Store.getAccounts().filter(function(x) { return x !== e; }))); },
  getTheme: function() { return localStorage.getItem('theme') || 'light'; },
  setTheme: function(t) { localStorage.setItem('theme', t); }
};

document.documentElement.dataset.theme = Store.getTheme();

var GMAIL = '<https://gmail.googleapis.com/gmail/v1>';

function gmailFetch(token, path, opts) {
  opts = opts || {};
  return fetch(GMAIL + path, Object.assign({}, opts, {
    headers: Object.assign({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, opts.headers || {})
  })).then(function(res) {
    if (res.status === 401) { var e = new Error('Token expired'); e.code = 401; throw e; }
    if (!res.ok) throw new Error('Gmail ' + res.status + ': ' + path);
    if (res.status === 204) return {};
    return res.json();
  });
}

function getSenders(token, maxThreads, onProgress) {
  var ids = [];
  var pageToken;
  function fetchPage() {
    var qs = new URLSearchParams({ labelIds: 'INBOX', maxResults: String(Math.min(500, maxThreads - ids.length)), fields: 'nextPageToken,threads/id' });
    if (pageToken) qs.set('pageToken', pageToken);
    return gmailFetch(token, '/users/me/threads?' + qs).then(function(data) {
      (data.threads || []).forEach(function(t) { ids.push(<t.id>); });
      pageToken = data.nextPageToken;
      if (pageToken && ids.length < maxThreads) return fetchPage();
    });
  }
  return fetchPage().then(function() {
    var map = {};
    var CHUNK = 25;
    var done = 0;
    function processChunk(i) {
      if (i >= ids.length) return Promise.resolve();
      var chunk = ids.slice(i, i + CHUNK);
      return Promise.allSettled(chunk.map(function(id) {
        return gmailFetch(token, '/users/me/threads/' + id + '?format=metadata&metadataHeaders=From&fields=messages/payload/headers');
      })).then(function(results) {
        results.forEach(function(r) {
          if (r.status !== 'fulfilled') return;
          var msgs = r.value.messages || [];
          if (!msgs.length) return;
          var headers = (msgs[0].payload && msgs[0].payload.headers) || [];
          var fromH = headers.find(function(h) { return h.name.toLowerCase() === 'from'; });
          if (!fromH) return;
          var parsed = parseFrom(fromH.value);
          if (!parsed.email) return;
          if (!map[parsed.email]) map[parsed.email] = { name: parsed.name, email: parsed.email, count: 0 };
          map[parsed.email].count++;
        });
        done += chunk.length;
        if (onProgress) onProgress(done, ids.length);
        return processChunk(i + CHUNK);
      });
    }
    return processChunk(0).then(function() {
      return Object.values(map).sort(function(a, b) { return b.count - a.count; });
    });
  });
}

function parseFrom(h) {
  var m = h.match(/^(.*?)\s*<([^>]+)>/);
  if (m) return { name: m[1].trim().replace(/^["']|["']$/g, ''), email: m[2].trim().toLowerCase() };
  var e = h.trim().toLowerCase();
  return { name: e, email: e };
}

function trashThreadsFrom(token, senderEmail) {
  var deleted = 0;
  var pt;
  function loop() {
    var qs = new URLSearchParams({ q: 'from:' + senderEmail + ' in:inbox', maxResults: '100', fields: 'nextPageToken,threads/id' });
    if (pt) qs.set('pageToken', pt);
    return gmailFetch(token, '/users/me/threads?' + qs).then(function(data) {
      var threads = data.threads || [];
      if (!threads.length) return deleted;
      return Promise.allSettled(threads.map(function(t) {
        return gmailFetch(token, '/users/me/threads/' + <t.id> + '/trash', { method: 'POST' });
      })).then(function() {
        deleted += threads.length;
        pt = data.nextPageToken;
        if (pt) return loop();
        return deleted;
      });
    });
  }
  return loop();
}

var Tokens = {};
function getToken(email) {
  var t = Tokens[email];
  return (t && Date.now() < t.expiry) ? t.token : null;
}

function requestToken(email) {
  return new Promise(function(resolve, reject) {
    var cid = Store.getClientId();
    if (!cid) { reject(new Error('No Client ID configured')); return; }
    if (!<window.google> || !window.google.accounts || !window.google.accounts.oauth2) {
      reject(new Error('Google SDK not loaded yet - try again in a moment')); return;
    }
    var client = google.accounts.oauth2.initTokenClient({
      client_id: cid,
      scope: '<https://www.googleapis.com/auth/gmail.modify>',
      hint: email || undefined,
      prompt: email ? '' : 'select_account',
      callback: function(resp) {
        if (resp.error) { reject(new Error(resp.error)); return; }
        var tok = resp.access_token;
        var expiry = Date.now() + (resp.expires_in - 60) * 1000;
        Tokens[resp.email || '__pending__'] = { token: tok, expiry: expiry };
        resolve({ token: tok, email: resp.email });
      }
    });
    client.requestAccessToken();
  });
}

var SPAM_EMAIL = /noreply|no-reply|donotreply|bounce|mailer-daemon|postmaster/i;
var BULK_EMAIL = /newsletter|marketing|promo|promotion|deals|offers|campaign|digest|blast|bulk|mass/i;
var BULK_NAME = /newsletter|deal|offer|promo|sale|weekly|daily|monthly|digest|update|alert|notification/i;
var NOTIFY_EMAIL = /notification|alert|update|info@|hello@|hi@|team@|support@|admin@/i;

function classify(s) {
  var e = s.email, n = (s.name || '').toLowerCase();
  if (SPAM_EMAIL.test(e)) return 'spam';
  if (BULK_EMAIL.test(e) || BULK_EMAIL.test(n)) return 'newsletter';
  if (BULK_NAME.test(n)) return 'newsletter';
  if (NOTIFY_EMAIL.test(e) && s.count >= 5) return 'newsletter';
  if (s.count >= 25) return 'newsletter';
  return 'regular';
}

function annotateSenders(senders) {
  return senders.map(function(s) { return Object.assign({}, s, { cat: classify(s) }); });
}

function computeStats(senders) {
  var total = senders.reduce(function(a, s) { return a + s.count; }, 0);
  var bycat = { spam: { senders: 0, emails: 0 }, newsletter: { senders: 0, emails: 0 }, regular: { senders: 0, emails: 0 } };
  senders.forEach(function(s) { bycat[s.cat].senders++; bycat[s.cat].emails += s.count; });
  return { total: total, senders: senders.length, bycat: bycat, cleanable: bycat.spam.emails + bycat.newsletter.emails };
}

var UI = { currentAcct: null, senders: {}, scanning: false, filter: 'all', search: '', sort: 'count', chart: null, donut: null };

var _toastT;
function toast(msg, dur) {
  dur = dur || 3500;
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(function() { el.classList.remove('show'); }, dur);
}

function esc(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s == null ? '' : s)));
  return d.innerHTML;
}
function fmt(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n); }
function safeId(s) { return s.replace(/[^a-z0-9]/gi, '_'); }

var CAT_COLORS = { spam: 'var(--red)', newsletter: 'var(--amber)', regular: 'var(--green)' };
var CAT_LABELS = { spam: 'Spam / Auto', newsletter: 'Newsletter', regular: 'Regular' };

function refreshHeader() {
  var accounts = Store.getAccounts();
  var sel = document.getElementById('acct-select');
  sel.innerHTML = '<option value="">&#8212; Select account &#8212;</option>' +
    accounts.map(function(a) { return '<option value="' + esc(a) + '"' + (a === UI.currentAcct ? ' selected' : '') + '>' + esc(a) + '</option>'; }).join('');
  document.getElementById('add-acct-btn').style.display = Store.getClientId() ? '' : 'none';
  document.getElementById('scan-btn').style.display = (UI.currentAcct && !UI.scanning) ? '' : 'none';
  document.getElementById('theme-btn').textContent = document.documentElement.dataset.theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

function render() {
  refreshHeader();
  var el = document.getElementById('main-content');
  if (!Store.getClientId()) { el.innerHTML = renderSetup(); return; }
  var accounts = Store.getAccounts();
  if (!accounts.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128236;</div><h2>No Gmail accounts connected</h2><p>Add an account to start cleaning your inbox.</p><button class="btn btn-primary" onclick="App.addAccount()">+ Add Gmail Account</button></div>';
    return;
  }
  if (!UI.currentAcct) { UI.currentAcct = accounts[0]; refreshHeader(); }
  var senders = UI.senders[UI.currentAcct];
  if (!senders) {
    el.innerHTML = '<div class="scan-prompt"><h2>Ready to scan</h2><p>We\'ll fetch your inbox, group emails by sender, and detect newsletters and bulk mail.</p><button class="btn btn-primary" onclick="App.scan()">Scan Inbox</button></div>';
    return;
  }
  var stats = computeStats(senders);
  el.innerHTML = renderStats(stats) + renderCharts(senders, stats) + renderTable(senders, stats);
  attachTableHandlers();
  drawCharts(senders, stats);
  animateCounters();
}

function renderSetup() {
  return '<div class="setup-card"><div class="setup-hero"><div class="icon">&#9993;&#65039;</div><h1>Gmail Inbox Cleaner</h1><p>Connect your Gmail and bulk-delete spam, newsletters and clutter.</p></div><div class="setup-body"><div class="setup-step"><div class="step-num">1</div><div class="step-body">Go to <a href="<https://console.cloud.google.com>" target="_blank"><console.cloud.google.com></a> &rarr; create a project &rarr; enable <strong>Gmail API</strong></div></div><div class="setup-step"><div class="step-num">2</div><div class="step-body"><strong>APIs &amp; Services &rarr; Credentials &rarr; Create OAuth 2.0 Client ID</strong><br>Type: <em>Web application</em> &middot; Add your URL to <em>Authorized JavaScript origins</em></div></div><div class="setup-step"><div class="step-num">3</div><div class="step-body">Copy your <strong>Client ID</strong> &mdash; it looks like <code>123&hellip;.<apps.googleusercontent.com></code></div></div><div class="cid-row"><input id="cid-input" class="cid-input" type="text" placeholder="Paste Client ID here..." value="' + esc(Store.getClientId()) + '"><button class="btn btn-primary" onclick="App.saveClientId()">Save &amp; Continue</button></div></div></div>';
}

function renderStats(stats) {
  var cards = [
    { label: 'Total Emails', value: fmt(stats.total), sub: 'in your inbox', cls: 'accent', icon: '&#128231;', id: 'st-total', filter: 'all' },
    { label: 'Unique Senders', value: fmt(stats.senders), sub: 'across ' + stats.senders + ' contacts', cls: '', icon: '&#128101;', id: 'st-send', filter: 'all' },
    { label: 'Spam / Bulk', value: fmt(stats.bycat.spam.senders + stats.bycat.newsletter.senders), sub: fmt(stats.bycat.spam.emails + stats.bycat.newsletter.emails) + ' emails detected', cls: 'danger', icon: '&#128680;', id: 'st-spam', filter: 'spam' },
    { label: 'Cleanable', value: fmt(stats.cleanable), sub: 'emails you can trash', cls: 'warning', icon: '&#129529;', id: 'st-clean', filter: 'newsletter' }
  ];
  return '<div class="stats-grid">' + cards.map(function(c) {
    return '<div class="stat-card ' + c.cls + ' ' + (c.filter ? 'clickable' : '') + '" id="' + <c.id> + '" onclick="App.quickFilter(\'' + c.filter + '\')">' +
      '<div class="stat-icon">' + c.icon + '</div>' +
      '<div class="stat-label">' + c.label + '</div>' +
      '<div class="stat-value" data-target="' + c.value + '">' + c.value + '</div>' +
      '<div class="stat-sub">' + c.sub + '</div></div>';
  }).join('') + '</div>';
}

function renderCharts(senders, stats) {
  var top10 = senders.slice(0, 10);
  var breakdown = ['spam', 'newsletter', 'regular'].map(function(cat) {
    var d = stats.bycat[cat];
    var pct = stats.total > 0 ? Math.round(d.emails / stats.total * 100) : 0;
    return '<div class="breakdown-item"><div class="bk-dot" style="background:' + CAT_COLORS[cat] + '"></div><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="bk-label">' + CAT_LABELS[cat] + '</span><span class="bk-count">' + fmt(d.emails) + '</span></div><div class="bk-bar-wrap"><div class="bk-bar" style="background:' + CAT_COLORS[cat] + ';width:0%" data-pct="' + pct + '"></div></div></div></div>';
  }).join('');
  return '<div class="charts-row"><div class="chart-card"><div class="chart-title">Top Senders</div><div class="chart-wrap" style="height:' + Math.min(top10.length * 34 + 40, 380) + 'px"><canvas id="chart-main"></canvas></div></div><div class="chart-card"><div class="chart-title">Inbox Breakdown</div><div style="display:flex;align-items:center;justify-content:center;margin-bottom:16px"><div style="width:160px;height:160px;position:relative"><canvas id="chart-donut"></canvas></div></div><div class="breakdown-list">' + breakdown + '</div></div></div>';
}

function renderTable(senders, stats) {
  var counts = { all: senders.length, spam: stats.bycat.spam.senders, newsletter: stats.bycat.newsletter.senders, regular: stats.bycat.regular.senders };
  var tabs = ['all', 'spam', 'newsletter', 'regular'].map(function(f) {
    return '<button class="filter-tab ' + (UI.filter === f ? 'active' : '') + '" onclick="App.setFilter(\'' + f + '\')">' + (f === 'all' ? 'All' : CAT_LABELS[f]) + '<span class="tab-count">' + counts[f] + '</span></button>';
  }).join('');
  var visible = getVisibleSenders(senders);
  var maxCount = (senders[0] && senders[0].count) || 1;
  var rows = visible.length === 0 ? '<div class="no-results">No senders match your filter.</div>' :
    visible.map(function(s) {
      var barPct = Math.round(s.count / maxCount * 100);
      return '<div class="sender-row" id="row-' + safeId(s.email) + '" data-email="' + esc(s.email) + '" data-cat="' + s.cat + '">' +
        '<input type="checkbox" class="row-cb" data-email="' + esc(s.email) + '">' +
        '<div class="risk-dot ' + s.cat + '"></div>' +
        '<div class="sender-info"><div class="sender-name">' + esc(s.name !== s.email ? s.name : s.email) + '</div><div class="sender-addr">' + esc(s.email) + '</div></div>' +
        '<div class="count-col"><div class="count-bar-wrap"><div class="count-bar" style="background:' + CAT_COLORS[s.cat] + ';width:0%" data-pct="' + barPct + '"></div></div><div class="count-num">' + s.count + ' email' + (s.count !== 1 ? 's' : '') + '</div></div>' +
        '<span class="badge ' + s.cat + '">' + (s.cat === 'spam' ? 'Auto-sender' : 'Newsletter') + '</span>' +
        '<div class="row-action"><button class="btn btn-danger btn-sm trash-btn" data-email="' + esc(s.email) + '">Trash</button></div></div>';
    }).join('');
  return '<div class="table-card"><div class="table-toolbar"><div class="filter-tabs">' + tabs + '</div><div class="search-wrap"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M12.9 14.32a8 8 0 1 1 1.41-1.41l4.38 4.37-1.42 1.42-4.37-4.38zM8 14A6 6 0 1 0 8 2a6 6 0 0 0 0 12z"/></svg><input class="search-input" id="search-input" placeholder="Search senders..." value="' + esc(UI.search) + '" oninput="App.setSearch(this.value)"></div><select class="sort-select" onchange="App.setSort(this.value)"><option value="count"' + (UI.sort === 'count' ? ' selected' : '') + '>Sort: Volume</option><option value="name"' + (UI.sort === 'name' ? ' selected' : '') + '>Sort: Name</option></select><button class="btn btn-secondary btn-sm" onclick="App.selectAllVisible()">Select all</button></div><div id="sender-rows">' + rows + '</div></div>';
}

function getVisibleSenders(senders) {
  var list = senders;
  if (UI.filter !== 'all') list = list.filter(function(s) { return s.cat === UI.filter; });
  if (UI.search) {
    var q = UI.search.toLowerCase();
    list = list.filter(function(s) { return s.email.toLowerCase().indexOf(q) !== -1 || (s.name || '').toLowerCase().indexOf(q) !== -1; });
  }
  if (UI.sort === 'name') list = list.slice().sort(function(a, b) { return (a.name || a.email).localeCompare(b.name || b.email); });
  return list;
}

function attachTableHandlers() {
  document.querySelectorAll('.trash-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { App.trashOne(btn.dataset.email, btn); });
  });
  document.querySelectorAll('.row-cb').forEach(function(cb) {
    cb.addEventListener('change', updateBulkBar);
  });
}

function drawCharts(senders, stats) {
  var top10 = senders.slice(0, 10);
  if (UI.chart) { UI.chart.destroy(); UI.chart = null; }
  if (UI.donut) { UI.donut.destroy(); UI.donut = null; }
  if (typeof Chart === 'undefined') return;
  var isDark = document.documentElement.dataset.theme === 'dark';
  Chart.defaults.color = isDark ? '#94a3b8' : '#64748b';
  Chart.defaults.borderColor = isDark ? '#334155' : '#e2e8f0';
  var barCtx = document.getElementById('chart-main');
  if (barCtx) {
    UI.chart = new Chart(barCtx.getContext('2d'), {
      type: 'bar',
      data: {
        labels: top10.map(function(s) { return s.name !== s.email && s.name ? s.name : s.email.split('@')[0]; }),
        datasets: [{ data: top10.map(function(s) { return s.count; }), backgroundColor: top10.map(function(s) { return CAT_COLORS[s.cat]; }), borderRadius: 4, borderSkipped: false }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return ' ' + ctx.raw + ' email' + (ctx.raw !== 1 ? 's' : '') + ' - ' + CAT_LABELS[top10[ctx.dataIndex].cat]; } } } },
        scales: { x: { beginAtZero: true, grid: { display: false } }, y: { grid: { display: false }, ticks: { font: { weight: '600' } } } },
        onClick: function(_, els) { if (els.length) { UI.search = top10[els[0].index].email; UI.filter = 'all'; render(); } }
      }
    });
  }
  var donutCtx = document.getElementById('chart-donut');
  if (donutCtx) {
    var d = stats.bycat;
    UI.donut = new Chart(donutCtx.getContext('2d'), {
      type: 'doughnut',
      data: { labels: ['Spam / Bulk', 'Newsletter', 'Regular'], datasets: [{ data: [d.spam.emails, d.newsletter.emails, d.regular.emails], backgroundColor: [CAT_COLORS.spam, CAT_COLORS.newsletter, CAT_COLORS.regular], borderWidth: 0, hoverOffset: 6 }] },
      options: { responsive: false, cutout: '68%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return ' ' + fmt(ctx.raw) + ' emails'; } } } } }
    });
  }
  requestAnimationFrame(function() {
    document.querySelectorAll('.bk-bar[data-pct]').forEach(function(el) { setTimeout(function() { el.style.width = el.dataset.pct + '%'; }, 100); });
    document.querySelectorAll('.count-bar[data-pct]').forEach(function(el) { setTimeout(function() { el.style.width = el.dataset.pct + '%'; }, 50); });
  });
}

function animateCounters() {
  document.querySelectorAll('.stat-value[data-target]').forEach(function(el) {
    var raw = el.dataset.target;
    var num = parseFloat(raw);
    if (isNaN(num) || raw.indexOf('k') !== -1) return;
    var frames = 30, frame = 0;
    function step() { frame++; el.textContent = Math.round(num * (frame / frames)); if (frame < frames) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  });
}

function updateBulkBar() {
  var checked = Array.from(document.querySelectorAll('.row-cb:checked'));
  var bar = document.getElementById('bulk-bar');
  if (!checked.length) { bar.classList.remove('visible'); return; }
  var totalEmails = checked.reduce(function(sum, cb) {
    var s = (UI.senders[UI.currentAcct] || []).find(function(x) { return x.email === cb.dataset.email; });
    return sum + ((s && s.count) || 0);
  }, 0);
  document.getElementById('bulk-label').textContent = checked.length + ' sender' + (checked.length !== 1 ? 's' : '') + ' selected';
  document.getElementById('bulk-sub').textContent = '~' + totalEmails + ' emails will be trashed';
  bar.classList.add('visible');
}

var App = {
  saveClientId: function() {
    var el = document.getElementById('cid-input');
    var v = el && el.value.trim();
    if (!v) { toast('Paste your Client ID first'); return; }
    Store.setClientId(v);
    render();
  },
  toggleTheme: function() {
    var t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
    Store.setTheme(t);
    document.getElementById('theme-meta').content = t === 'dark' ? '#1e293b' : '#6366f1';
    refreshHeader();
    var s = UI.senders[UI.currentAcct];
    if (s) { var stats = computeStats(s); drawCharts(s, stats); }
  },
  addAccount: function() {
    requestToken().then(function(r) {
      if (r.email) {
        if (Tokens['__pending__']) { Tokens[r.email] = Tokens['__pending__']; delete Tokens['__pending__']; }
        Store.addAccount(r.email);
        UI.currentAcct = r.email;
        render();
        toast('Added ' + r.email);
      }
    }).catch(function(e) { toast('Sign-in failed: ' + e.message); });
  },
  switchAccount: function(email) {
    if (!email) return;
    UI.currentAcct = email; UI.filter = 'all'; UI.search = ''; UI.sort = 'count';
    render();
  },
  scan: function() {
    var acct = UI.currentAcct;
    if (!acct) { toast('Select an account first'); return; }
    var token = getToken(acct);
    var p = token ? Promise.resolve({ token: token }) : (toast('Re-authenticating...'), requestToken(acct));
    p.then(function(r) {
      if (!token) { token = r.token; Tokens[acct] = { token: token, expiry: Date.now() + 3540000 }; }
      UI.scanning = true;
      var prog = document.getElementById('scan-progress');
      var bar = document.getElementById('scan-bar');
      var txt = document.getElementById('scan-text');
      prog.classList.add('visible');
      document.getElementById('scan-btn').style.display = 'none';
      return getSenders(token, 500, function(done, total) {
        bar.style.width = Math.round(done / total * 100) + '%';
        txt.textContent = 'Scanning ' + done + ' / ' + total + '...';
      }).then(function(senders) {
        UI.senders[acct] = annotateSenders(senders);
        UI.filter = 'all'; UI.search = ''; UI.sort = 'count';
        render();
        toast('Found ' + senders.length + ' senders across ' + senders.reduce(function(a, s) { return a + s.count; }, 0) + ' emails');
      }).catch(function(e) {
        if (e.code === 401) { delete Tokens[acct]; toast('Session expired - scan again'); }
        else toast('Scan failed: ' + e.message);
      }).then(function() {
        UI.scanning = false;
        prog.classList.remove('visible');
        bar.style.width = '0%';
        refreshHeader();
      });
    }).catch(function(e) { toast('Auth failed: ' + e.message); });
  },
  setFilter: function(f) { UI.filter = f; render(); },
  setSearch: function(v) { UI.search = v; _rerenderTable(); },
  setSort: function(v) { UI.sort = v; _rerenderTable(); },
  quickFilter: function(f) {
    UI.filter = f; UI.search = '';
    _rerenderTable();
    var el = document.getElementById('sender-rows');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  },
  selectAllVisible: function() {
    var senders = UI.senders[UI.currentAcct] || [];
    var visible = getVisibleSenders(senders).map(function(s) { return s.email; });
    document.querySelectorAll('.row-cb').forEach(function(cb) { cb.checked = visible.indexOf(cb.dataset.email) !== -1; });
    updateBulkBar();
  },
  clearSelection: function() {
    document.querySelectorAll('.row-cb:checked').forEach(function(cb) { cb.checked = false; });
    updateBulkBar();
  },
  trashOne: function(email, btn) {
    var token = getToken(UI.currentAcct);
    if (!token) { toast('Session expired - scan again'); return; }
    if (!confirm('Trash all emails from\n' + email + '?')) return;
    btn.disabled = true; btn.textContent = '...';
    trashThreadsFrom(token, email).then(function(n) {
      toast('Trashed ' + n + ' email' + (n !== 1 ? 's' : '') + ' from ' + email);
      _removeSenderFromState(email);
      var row = document.getElementById('row-' + safeId(email));
      if (row) { row.classList.add('fading'); setTimeout(function() { row.remove(); }, 400); }
    }).catch(function(e) { toast('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Trash'; });
  },
  trashSelected: function() {
    var checked = Array.from(document.querySelectorAll('.row-cb:checked'));
    if (!checked.length) return;
    var token = getToken(UI.currentAcct);
    if (!token) { toast('Session expired - scan again'); return; }
    if (!confirm('Trash emails from ' + checked.length + ' sender(s)?')) return;
    App.clearSelection();
    var total = 0;
    var chain = Promise.resolve();
    checked.forEach(function(cb) {
      chain = chain.then(function() {
        return trashThreadsFrom(token, cb.dataset.email).then(function(n) {
          total += n;
          _removeSenderFromState(cb.dataset.email);
          var row = document.getElementById('row-' + safeId(cb.dataset.email));
          if (row) { row.classList.add('fading'); setTimeout(function() { row.remove(); }, 400); }
        }).catch(function(e) { toast('Error on ' + cb.dataset.email + ': ' + e.message); });
      });
    });
    chain.then(function() {
      toast('Trashed ' + total + ' emails across ' + checked.length + ' sender' + (checked.length !== 1 ? 's' : ''));
      setTimeout(render, 500);
    });
  }
};

function _removeSenderFromState(email) {
  if (UI.senders[UI.currentAcct]) {
    UI.senders[UI.currentAcct] = UI.senders[UI.currentAcct].filter(function(s) { return s.email !== email; });
  }
}

function _rerenderTable() {
  var senders = UI.senders[UI.currentAcct];
  if (!senders) return;
  render();
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}
</script>
