<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" id="theme-meta" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inbox Cleaner">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>Gmail Inbox Cleaner</title>
  <script src="<https://accounts.google.com/gsi/client>" async></script>
  <script src="<https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js>"></script>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { min-height: 100%; overscroll-behavior-y: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif; font-size: 15px; line-height: 1.5; transition: background .2s, color .2s; }
  :root {
    --bg:#f1f5f9;--surf:#ffffff;--surf2:#f8fafc;--bdr:#e2e8f0;--txt:#0f172a;--muted:#64748b;
    --accent:#6366f1;--accent2:#4f46e5;--red:#ef4444;--red-bg:#fef2f2;--amber:#f59e0b;
    --amber-bg:#fffbeb;--green:#10b981;--green-bg:#ecfdf5;--blue:#3b82f6;--blue-bg:#eff6ff;
    --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--sh2:0 4px 16px rgba(0,0,0,.10);
    --rad:12px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"] {
    --bg:#0f172a;--surf:#1e293b;--surf2:#0f172a;--bdr:#334155;--txt:#f1f5f9;--muted:#94a3b8;
    --accent:#818cf8;--accent2:#6366f1;--red:#f87171;--red-bg:#1e1015;--amber:#fbbf24;
    --amber-bg:#1c1507;--green:#34d399;--green-bg:#052e16;--blue:#60a5fa;--blue-bg:#0c1a2e;
    --sh:0 1px 3px rgba(0,0,0,.3);--sh2:0 4px 24px rgba(0,0,0,.4);
  }
  body { background:var(--bg); color:var(--txt); }
  #app { display:flex; flex-direction:column; min-height:100dvh; }
  header { background:var(--surf); border-bottom:1px solid var(--bdr); padding:calc(14px + var(--safe-t)) 20px 14px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; box-shadow:var(--sh); }
  .logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .logo-icon { width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:1rem; }
  .logo-text { font-size:1rem; font-weight:700; }
  .logo-text span { color:var(--accent); }
  .acct-select { flex:1; max-width:260px; padding:7px 12px; background:var(--surf2); border:1px solid var(--bdr); border-radius:8px; font-size:.85rem; color:var(--txt); cursor:pointer; outline:none; }
  .hdr-actions { display:flex; gap:8px; margin-left:auto; align-items:center; }
  .scan-progress { flex:1; max-width:200px; display:none; align-items:center; gap:8px; font-size:.8rem; color:var(--muted); }
  .scan-progress.visible { display:flex; }
  .scan-bar-wrap { flex:1; height:4px; background:var(--bdr); border-radius:2px; overflow:hidden; }
  .scan-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; width:0%; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 16px; border-radius:8px; border:none; cursor:pointer; font-size:.85rem; font-weight:600; transition:all .15s; min-height:38px; white-space:nowrap; }
  .btn:disabled { opacity:.45; cursor:not-allowed; pointer-events:none; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-secondary { background:var(--surf2); color:var(--txt); border:1px solid var(--bdr); }
  .btn-secondary:hover { background:var(--bdr); }
  .btn-danger { background:var(--red); color:#fff; }
  .btn-ghost { background:transparent; color:var(--muted); }
  .btn-sm { padding:6px 12px; font-size:.8rem; min-height:32px; }
  main { flex:1; padding:20px; }
  .container { max-width:1100px; margin:0 auto; }
  .setup-card { max-width:540px; margin:32px auto; background:var(--surf); border-radius:var(--rad); border:1px solid var(--bdr); box-shadow:var(--sh2); overflow:hidden; }
  .setup-hero { background:linear-gradient(135deg,var(--accent),var(--blue)); padding:32px 28px; text-align:center; color:#fff; }
  .setup-hero .icon { font-size:2.5rem; margin-bottom:10px; }
  .setup-hero h1 { font-size:1.4rem; font-weight:700; }
  .setup-hero p { opacity:.85; margin-top:6px; font-size:.9rem; }
  .setup-body { padding:28px; }
  .setup-step { display:flex; gap:14px; margin-bottom:16px; align-items:flex-start; }
  .step-num { flex-shrink:0; width:28px; height:28px; border-radius:50%; background:var(--accent); color:#fff; font-size:.8rem; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .step-body { font-size:.875rem; padding-top:4px; }
  code { background:var(--surf2); border:1px solid var(--bdr); padding:1px 6px; border-radius:4px; font-size:.82em; word-break:break-all; }
  .cid-row { display:flex; gap:8px; margin-top:20px; }
  .cid-input { flex:1; padding:10px 14px; background:var(--surf2); color:var(--txt); border:2px solid var(--bdr); border-radius:8px; font-size:.875rem; outline:none; transition:border-color .2s; }
  .cid-input:focus { border-color:var(--accent); }
  .empty-state { text-align:center; padding:60px 24px; }
  .empty-icon { font-size:3.5rem; margin-bottom:16px; }
  .empty-state h2 { font-size:1.2rem; margin-bottom:8px; }
  .empty-state p { color:var(--muted); margin-bottom:24px; }
  .scan-prompt { background:var(--surf); border:1px solid var(--bdr); border-radius:var(--rad); padding:40px; text-align:center; box-shadow:var(--sh); }
  .scan-prompt h2 { font-size:1.1rem; margin-bottom:8px; }
  .scan-prompt p { color:var(--muted); margin-bottom:24px; font-size:.9rem; }
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
  @media(min-width:640px){ .stats-grid { grid-template-columns:repeat(4,1fr); } }
  .stat-card { background:var(--surf); border:1px solid var(--bdr); border-radius:var(--rad); padding:18px 20px; box-shadow:var(--sh); cursor:pointer; transition:box-shadow .2s,transform .2s; }
  .stat-card:hover { box-shadow:var(--sh2); transform:translateY(-1px); }
  .stat-icon { font-size:1.4rem; margin-bottom:8px; }
  .stat-label { font-size:.75rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .stat-value { font-size:1.8rem; font-weight:800; line-height:1; }
  .stat-sub { font-size:.78rem; color:var(--muted); margin-top:4px; }
  .stat-card.danger .stat-value { color:var(--red); }
  .stat-card.warning .stat-value { color:var(--amber); }
  .stat-card.accent .stat-value { color:var(--accent); }
  .charts-row { display:grid; grid-template-columns:1fr; gap:12px; margin-bottom:20px; }
  @media(min-width:800px){ .charts-row { grid-template-columns:3fr 2fr; } }
  .chart-card { background:var(--surf); border:1px solid var(--bdr); border-radius:var(--rad); padding:20px; box-shadow:var(--sh); }
  .chart-title { font-size:.85rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:16px; }
  .chart-wrap { position:relative; }
  .breakdown-list { display:flex; flex-direction:column; gap:12px; }
  .breakdown-item { display:flex; align-items:center; gap:10px; }
  .bk-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .bk-label { font-size:.875rem; flex:1; }
  .bk-count { font-size:.875rem; font-weight:700; }
  .bk-bar-wrap { height:6px; background:var(--bdr); border-radius:3px; margin-top:4px; overflow:hidden; }
  .bk-bar { height:100%; border-radius:3px; transition:width .6s ease; }
  .table-card { background:var(--surf); border:1px solid var(--bdr); border-radius:var(--rad); box-shadow:var(--sh); overflow:hidden; margin-bottom:80px; }
  .table-toolbar { padding:14px 16px; border-bottom:1px solid var(--bdr); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .filter-tabs { display:flex; gap:4px; flex-wrap:wrap; }
  .filter-tab { padding:5px 12px; border-radius:20px; font-size:.8rem; font-weight:600; border:1px solid var(--bdr); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .filter-tab:hover { border-color:var(--accent); color:var(--accent); }
  .filter-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .filter-tab .tab-count { margin-left:4px; opacity:.75; }
  .search-wrap { flex:1; min-width:160px; position:relative; }
  .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:15px; opacity:.45; }
  .search-input { width:100%; padding:8px 12px 8px 32px; background:var(--surf2); color:var(--txt); border:1px solid var(--bdr); border-radius:8px; font-size:.85rem; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .sort-select { padding:8px 10px; background:var(--surf2); color:var(--txt); border:1px solid var(--bdr); border-radius:8px; font-size:.8rem; outline:none; }
  .sender-row { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--bdr); transition:background .12s,opacity .3s; }
  .sender-row:last-child { border-bottom:none; }
  .sender-row:hover { background:var(--surf2); }
  .sender-row.fading { opacity:.15; pointer-events:none; }
  .row-cb { width:18px; height:18px; flex-shrink:0; accent-color:var(--accent); cursor:pointer; }
  .risk-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .risk-dot.spam { background:var(--red); }
  .risk-dot.newsletter { background:var(--amber); }
  .risk-dot.regular { background:var(--green); }
  .sender-info { flex:1; min-width:0; }
  .sender-name { font-weight:600; font-size:.875rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sender-addr { font-size:.75rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .count-col { flex-shrink:0; width:100px; display:none; }
  @media(min-width:600px){ .count-col { display:block; } }
  .count-bar-wrap { height:5px; background:var(--bdr); border-radius:3px; margin-bottom:3px; overflow:hidden; }
  .count-bar { height:100%; border-radius:3px; transition:width .6s ease; }
  .count-num { font-size:.75rem; color:var(--muted); font-weight:600; }
  .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:.72rem; font-weight:700; flex-shrink:0; }
  .badge.spam { background:var(--red-bg); color:var(--red); }
  .badge.newsletter { background:var(--amber-bg); color:var(--amber); }
  .badge.regular { display:none; }
  .row-action { flex-shrink:0; }
  .no-results { text-align:center; padding:32px; color:var(--muted); font-size:.9rem; }
  #bulk-bar { position:fixed; bottom:calc(16px + var(--safe-b)); left:50%; transform:translateX(-50%) translateY(90px); background:var(--txt); color:var(--surf); padding:12px 20px; border-radius:40px; display:flex; align-items:center; gap:14px; box-shadow:0 8px 32px rgba(0,0,0,.28); z-index:200; transition:transform .25s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; font-size:.875rem; }
  #bulk-bar.visible { transform:translateX(-50%) translateY(0); }
  #bulk-bar .bulk-label { font-weight:600; }
  #bulk-bar .bulk-sub { opacity:.6; font-size:.78rem; }
  #bulk-bar .btn-bulk-trash { background:var(--red); color:#fff; }
  #bulk-bar .btn-bulk-cancel { background:rgba(255,255,255,.15); color:inherit; }
  #toast { position:fixed; bottom:calc(90px + var(--safe-b)); left:50%; transform:translateX(-50%) translateY(16px); background:#1e293b; color:#f1f5f9; padding:10px 20px; border-radius:20px; font-size:.875rem; z-index:300; opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.25); }
  [data-theme="dark"] #toast { background:#f1f5f9; color:#0f172a; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .spinner { width:16px; height:16px; border:2px solid var(--bdr); border-top-color:var(--accent); border-radius:50%; animation:spin .65s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }
  a { color:var(--accent); text-decoration:none; }
  select,input { color-scheme:inherit; }
  @media(max-width:479px){
    main { padding:12px; }
    header { padding:calc(10px + var(--safe-t)) 12px 10px; gap:8px; }
    .logo-text { display:none; }
    .acct-select { max-width:140px; font-size:.8rem; }
    .stat-value { font-size:1.5rem; }
    .badge { display:none; }
  }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✉</div>
      <div class="logo-text">Inbox <span>Cleaner</span></div>
    </div>
    <select class="acct-select" id="acct-select" onchange="App.switchAccount(this.value)">
      <option value="">— Select account —</option>
    </select>
    <div class="scan-progress" id="scan-progress">
      <div class="spinner"></div>
      <div style="flex:1">
        <div class="scan-bar-wrap"><div class="scan-bar" id="scan-bar"></div></div>
        <div id="scan-text" style="font-size:.72rem;margin-top:2px">Scanning…</div>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="btn btn-primary btn-sm" id="scan-btn" onclick="App.scan()" style="display:none">Scan</button>
      <button class="btn btn-secondary btn-sm" id="theme-btn" onclick="App.toggleTheme()">🌙</button>
      <button class="btn btn-secondary btn-sm" id="add-acct-btn" style="display:none" onclick="App.addAccount()">+ Account</button>
    </div>
  </header>
  <main><div class="container" id="main-content"></div></main>
</div>
<div id="bulk-bar">
  <div>
    <div class="bulk-label" id="bulk-label">0 senders selected</div>
    <div class="bulk-sub" id="bulk-sub"></div>
  </div>
  <button class="btn btn-sm btn-bulk-trash" onclick="App.trashSelected()">🗑 Trash All</button>
  <button class="btn btn-sm btn-bulk-cancel" onclick="App.clearSelection()">Cancel</button>
</div>
<div id="toast"></div>
<script>
'use strict';
const Device=(()=>{const ua=navigator.userAgent,w=window.innerWidth,isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1),isAndroid=/Android/.test(ua),isTouch=navigator.maxTouchPoints>0,isMobile=(isIOS||isAndroid)||(isTouch&&w<768),isTablet=!isMobile&&isTouch&&w<1280,type=isMobile?'mobile':isTablet?'tablet':'desktop';document.body.dataset.device=type;return{type,isMobile,isTablet,isDesktop:!isMobile&&!isTablet,isTouch,isIOS};})();
const Store={getClientId:()=>localStorage.getItem('gcid')||'',setClientId:v=>localStorage.setItem('gcid',v),getAccounts:()=>JSON.parse(localStorage.getItem('accounts')||'[]'),addAccount:e=>{const a=Store.getAccounts();if(!a.includes(e)){a.push(e);localStorage.setItem('accounts',JSON.stringify(a));}},removeAccount:e=>localStorage.setItem('accounts',JSON.stringify(Store.getAccounts().filter(x=>x!==e))),getTheme:()=>localStorage.getItem('theme')||'light',setTheme:t=>localStorage.setItem('theme',t)};
document.documentElement.dataset.theme=Store.getTheme();
const GMAIL='<https://gmail.googleapis.com/gmail/v1>';
async function gmailFetch(token,path,opts={}){const res=await fetch(GMAIL+path,{...opts,headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json',...(opts.headers||{})}});if(res.status===401)throw Object.assign(new Error('Token expired'),{code:401});if(!res.ok)throw new Error(`Gmail ${res.status}`);if(res.status===204)return{};return res.json();}
async function getSenders(token,maxThreads,onProgress){const ids=[];let pt;while(ids.length<maxThreads){const qs=new URLSearchParams({labelIds:'INBOX',maxResults:Math.min(500,maxThreads-ids.length),fields:'nextPageToken,threads/id'});if(pt)qs.set('pageToken',pt);const d=await gmailFetch(token,`/users/me/threads?${qs}`);(d.threads||[]).forEach(t=>ids.push(<t.id>));pt=d.nextPageToken;if(!pt)break;}
const map={};const CHUNK=25;let done=0;
for(let i=0;i<ids.length;i+=CHUNK){const chunk=ids.slice(i,i+CHUNK);const res=await Promise.allSettled(chunk.map(id=>gmailFetch(token,`/users/me/threads/${id}?format=metadata&metadataHeaders=From&fields=messages/payload/headers`)));res.forEach(r=>{if(r.status!=='fulfilled')return;const msgs=r.value.messages||[];if(!msgs.length)return;const from=(msgs[0].payload?.headers||[]).find(h=>h.name.toLowerCase()==='from');if(!from)return;const{name,email}=parseFrom(from.value);if(!email)return;if(!map[email])map[email]={name,email,count:0};map[email].count++;});done+=chunk.length;onProgress?.(done,ids.length);}
return Object.values(map).sort((a,b)=>b.count-a.count);}
function parseFrom(h){const m=h.match(/^(.*?)\s*<([^>]+)>/);if(m)return{name:m[1].trim().replace(/^["']|["']$/g,''),email:m[2].trim().toLowerCase()};const e=h.trim().toLowerCase();return{name:e,email:e};}
async function trashThreadsFrom(token,sender){let deleted=0,pt;while(true){const qs=new URLSearchParams({q:`from:${sender} in:inbox`,maxResults:100,fields:'nextPageToken,threads/id'});if(pt)qs.set('pageToken',pt);const d=await gmailFetch(token,`/users/me/threads?${qs}`);const threads=d.threads||[];if(!threads.length)break;await Promise.allSettled(threads.map(t=>gmailFetch(token,`/users/me/threads/${<t.id>}/trash`,{method:'POST'})));deleted+=threads.length;pt=d.nextPageToken;if(!pt)break;}return deleted;}
const Tokens={};
function getToken(email){const t=Tokens[email];return(t&&Date.now()<t.expiry)?t.token:null;}
function requestToken(email){return new Promise((resolve,reject)=>{const cid=Store.getClientId();if(!cid){reject(new Error('No Client ID'));return;}if(!<window.google>?.accounts?.oauth2){reject(new Error('Google SDK not ready — wait a moment and try again'));return;}const client=google.accounts.oauth2.initTokenClient({client_id:cid,scope:'<https://www.googleapis.com/auth/gmail.modify',hint:email||undefined,prompt:email?'':'select_account',callback:resp=>>{if(resp.error){reject(new Error(resp.error));return;}Tokens[resp.email||'__p__']={token:resp.access_token,expiry:Date.now()+(resp.expires_in-60)*1000};resolve({token:resp.access_token,email:resp.email});}});client.requestAccessToken();});}
const SPAM_EMAIL=/noreply|no-reply|donotreply|bounce|mailer-daemon|postmaster/i;
const BULK_EMAIL=/newsletter|marketing|promo|promotion|deals|offers|campaign|digest|blast|bulk|mass/i;
const BULK_NAME=/newsletter|deal|offer|promo|sale|weekly|daily|monthly|digest|update|alert|notification/i;
const NOTIFY_EMAIL=/notification|alert|update|info@|hello@|hi@|team@|support@|admin@/i;
function classify(s){const e=s.email,n=(s.name||'').toLowerCase();if(SPAM_EMAIL.test(e))return'spam';if(BULK_EMAIL.test(e)||BULK_EMAIL.test(n))return'newsletter';if(BULK_NAME.test(n))return'newsletter';if(NOTIFY_EMAIL.test(e)&&s.count>=5)return'newsletter';if(s.count>=25)return'newsletter';return'regular';}
function annotateSenders(s){return s.map(x=>({...x,cat:classify(x)}));}
function computeStats(senders){const total=senders.reduce((a,s)=>a+s.count,0);const bycat={spam:{senders:0,emails:0},newsletter:{senders:0,emails:0},regular:{senders:0,emails:0}};senders.forEach(s=>{bycat[s.cat].senders++;bycat[s.cat].emails+=s.count;});return{total,senders:senders.length,bycat,cleanable:bycat.spam.emails+bycat.newsletter.emails};}
const UI={currentAcct:null,senders:{},scanning:false,filter:'all',search:'',sort:'count',chart:null,donut:null};
let _tt;function toast(msg,dur=3500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),dur);}
function esc(s){const d=document.createElement('div');d.appendChild(document.createTextNode(String(s??'')));return d.innerHTML;}
function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n);}
function safeId(s){return s.replace(/[^a-z0-9]/gi,'_');}
const CC={spam:'var(--red)',newsletter:'var(--amber)',regular:'var(--green)'};
const CL={spam:'Spam / Auto',newsletter:'Newsletter',regular:'Regular'};
function refreshHeader(){const accounts=Store.getAccounts();const sel=document.getElementById('acct-select');sel.innerHTML='<option value="">— Select account —</option>'+accounts.map(a=>`<option value="${esc(a)}"${a===UI.currentAcct?' selected':''}>${esc(a)}</option>`).join('');document.getElementById('add-acct-btn').style.display=Store.getClientId()?'':'none';document.getElementById('scan-btn').style.display=(UI.currentAcct&&!UI.scanning)?'':'none';document.getElementById('theme-btn').textContent=document.documentElement.dataset.theme==='dark'?'☀️':'🌙';}
function render(){refreshHeader();const el=document.getElementById('main-content');if(!Store.getClientId()){el.innerHTML=renderSetup();return;}const accounts=Store.getAccounts();if(!accounts.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">📬</div><h2>No accounts connected</h2><p>Add a Gmail account to get started.</p><button class="btn btn-primary" onclick="App.addAccount()">+ Add Gmail Account</button></div>`;return;}if(!UI.currentAcct){UI.currentAcct=accounts[0];refreshHeader();}const senders=UI.senders[UI.currentAcct];if(!senders){el.innerHTML=`<div class="scan-prompt"><h2>Ready to scan</h2><p>Fetch your inbox and group emails by sender to detect newsletters and bulk mail.</p><button class="btn btn-primary" onclick="App.scan()">Scan Inbox</button></div>`;return;}const stats=computeStats(senders);el.innerHTML=renderStats(stats)+renderCharts(senders,stats)+renderTable(senders,stats);attachHandlers();drawCharts(senders,stats);animateCounters();}
function renderStats(s){const cards=[{label:'Total Emails',value:fmt(s.total),sub:'in your inbox',cls:'accent',icon:'📧',f:'all'},{label:'Unique Senders',value:fmt(s.senders),sub:s.senders+' contacts',cls:'',icon:'👥',f:'all'},{label:'Spam / Bulk',value:fmt(s.bycat.spam.senders+s.bycat.newsletter.senders),sub:fmt(s.bycat.spam.emails+s.bycat.newsletter.emails)+' emails',cls:'danger',icon:'🚨',f:'spam'},{label:'Cleanable',value:fmt(s.cleanable),sub:'emails you can trash',cls:'warning',icon:'🧹',f:'newsletter'}];return`<div class="stats-grid">${cards.map(c=>`<div class="stat-card ${c.cls}" onclick="App.quickFilter('${c.f}')"><div class="stat-icon">${c.icon}</div><div class="stat-label">${c.label}</div><div class="stat-value" data-target="${c.value}">${c.value}</div><div class="stat-sub">${c.sub}</div></div>`).join('')}</div>`;}
function renderCharts(senders,stats){return`<div class="charts-row"><div class="chart-card"><div class="chart-title">Top Senders</div><div class="chart-wrap" style="height:${Math.min(senders.slice(0,10).length*34+40,380)}px"><canvas id="chart-main"></canvas></div></div><div class="chart-card"><div class="chart-title">Inbox Breakdown</div><div style="display:flex;align-items:center;justify-content:center;margin-bottom:16px"><div style="width:160px;height:160px"><canvas id="chart-donut"></canvas></div></div><div class="breakdown-list">${['spam','newsletter','regular'].map(cat=>{const d=stats.bycat[cat];const pct=stats.total>0?Math.round(d.emails/stats.total*100):0;return`<div class="breakdown-item"><div class="bk-dot" style="background:${CC[cat]}"></div><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span class="bk-label">${CL[cat]}</span><span class="bk-count">${fmt(d.emails)}</span></div><div class="bk-bar-wrap"><div class="bk-bar" style="background:${CC[cat]};width:0%" data-pct="${pct}"></div></div></div></div>`;}).join('')}</div></div></div>`;}
function renderTable(senders,stats){const counts={all:senders.length,spam:stats.bycat.spam.senders,newsletter:stats.bycat.newsletter.senders,regular:stats.bycat.regular.senders};const tabs=['all','spam','newsletter','regular'].map(f=>`<button class="filter-tab${UI.filter===f?' active':''}" onclick="App.setFilter('${f}')">${f==='all'?'All':CL[f]}<span class="tab-count">${counts[f]}</span></button>`).join('');const visible=getVisible(senders);const mx=senders[0]?.count||1;const rows=visible.length===0?`<div class="no-results">No senders match.</div>`:visible.map(s=>`<div class="sender-row" id="row-${safeId(s.email)}" data-email="${esc(s.email)}"><input type="checkbox" class="row-cb" data-email="${esc(s.email)}"><div class="risk-dot ${s.cat}"></div><div class="sender-info"><div class="sender-name">${esc(s.name!==s.email?s.name:s.email)}</div><div class="sender-addr">${esc(s.email)}</div></div><div class="count-col"><div class="count-bar-wrap"><div class="count-bar" style="background:${CC[s.cat]};width:0%" data-pct="${Math.round(s.count/mx*100)}"></div></div><div class="count-num">${s.count} email${s.count!==1?'s':''}</div></div><span class="badge ${s.cat}">${s.cat==='spam'?'Auto-sender':'Newsletter'}</span><div class="row-action"><button class="btn btn-danger btn-sm trash-btn" data-email="${esc(s.email)}">Trash</button></div></div>`).join('');return`<div class="table-card"><div class="table-toolbar"><div class="filter-tabs">${tabs}</div><div class="search-wrap"><svg viewBox="0 0 20 20" fill="currentColor"><path d="M12.9 14.32a8 8 0 1 1 1.41-1.41l4.38 4.37-1.42 1.42-4.37-4.38zM8 14A6 6 0 1 0 8 2a6 6 0 0 0 0 12z"/></svg><input class="search-input" placeholder="Search…" value="${esc(UI.search)}" oninput="App.setSearch(this.value)"></div><select class="sort-select" onchange="App.setSort(this.value)"><option value="count"${UI.sort==='count'?' selected':''}>Volume</option><option value="name"${UI.sort==='name'?' selected':''}>Name</option></select><button class="btn btn-secondary btn-sm" onclick="App.selectAllVisible()">Select all</button></div><div id="sender-rows">${rows}</div></div>`;}
function getVisible(senders){let l=senders;if(UI.filter!=='all')l=l.filter(s=>s.cat===UI.filter);if(UI.search){const q=UI.search.toLowerCase();l=l.filter(s=>s.email.toLowerCase().includes(q)||(s.name||'').toLowerCase().includes(q));}if(UI.sort==='name')l=[...l].sort((a,b)=>(a.name||a.email).localeCompare(b.name||b.email));return l;}
function attachHandlers(){document.querySelectorAll('.trash-btn').forEach(b=>b.addEventListener('click',()=>App.trashOne(b.dataset.email,b)));document.querySelectorAll('.row-cb').forEach(cb=>cb.addEventListener('change',updateBulkBar));}
function drawCharts(senders,stats){const top10=senders.slice(0,10);if(UI.chart){UI.chart.destroy();UI.chart=null;}if(UI.donut){UI.donut.destroy();UI.donut=null;}const dk=document.documentElement.dataset.theme==='dark';Chart.defaults.color=dk?'#94a3b8':'#64748b';Chart.defaults.borderColor=dk?'#334155':'#e2e8f0';const bc=document.getElementById('chart-main')?.getContext('2d');if(bc){UI.chart=new Chart(bc,{type:'bar',data:{labels:top10.map(s=>s.name!==s.email&&s.name?s.name:s.email.split('@')[0]),datasets:[{data:top10.map(s=>s.count),backgroundColor:top10.map(s=>CC[s.cat]),borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw} emails · ${CL[top10[ctx.dataIndex].cat]}`}}},scales:{x:{beginAtZero:true,grid:{display:false}},y:{grid:{display:false}}},onClick:(_,els)=>{if(els.length){UI.search=top10[els[0].index].email;UI.filter='all';render();}}}});}
const dc=document.getElementById('chart-donut')?.getContext('2d');if(dc){const d=stats.bycat;UI.donut=new Chart(dc,{type:'doughnut',data:{labels:['Spam','Newsletter','Regular'],datasets:[{data:[d.spam.emails,d.newsletter.emails,d.regular.emails],backgroundColor:[CC.spam,CC.newsletter,CC.regular],borderWidth:0,hoverOffset:6}]},options:{responsive:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)} emails`}}}}});}
requestAnimationFrame(()=>{document.querySelectorAll('.bk-bar[data-pct]').forEach(el=>setTimeout(()=>{el.style.width=el.dataset.pct+'%';},100));document.querySelectorAll('.count-bar[data-pct]').forEach(el=>setTimeout(()=>{el.style.width=el.dataset.pct+'%';},50));});}
function animateCounters(){document.querySelectorAll('.stat-value[data-target]').forEach(el=>{const raw=el.dataset.target,num=parseFloat(raw);if(isNaN(num)||raw.includes('k'))return;let f=0;const step=()=>{f++;el.textContent=Math.round(num*(f/30));if(f<30)requestAnimationFrame(step);};requestAnimationFrame(step);});}
function renderSetup(){return`<div class="setup-card"><div class="setup-hero"><div class="icon">✉️</div><h1>Gmail Inbox Cleaner</h1><p>Connect your Gmail and bulk-delete spam, newsletters and clutter.</p></div><div class="setup-body"><div class="setup-step"><div class="step-num">1</div><div class="step-body">Go to <a href="<https://console.cloud.google.com>" target="_blank"><console.cloud.google.com></a> → create a project → enable <strong>Gmail API</strong></div></div><div class="setup-step"><div class="step-num">2</div><div class="step-body"><strong>APIs & Services → Credentials → OAuth 2.0 Client ID</strong><br>Type: Web application · Add your site URL to Authorized JavaScript origins</div></div><div class="setup-step"><div class="step-num">3</div><div class="step-body">Copy your Client ID — looks like <code>123….<apps.googleusercontent.com></code></div></div><div class="cid-row"><input id="cid-input" class="cid-input" type="text" placeholder="Paste Client ID here…" value="${esc(Store.getClientId())}"><button class="btn btn-primary" onclick="App.saveClientId()">Save & Continue</button></div></div></div>`;}
function updateBulkBar(){const checked=[...document.querySelectorAll('.row-cb:checked')];const bar=document.getElementById('bulk-bar');if(!checked.length){bar.classList.remove('visible');return;}const total=checked.reduce((s,cb)=>{const x=(UI.senders[UI.currentAcct]||[]).find(y=>y.email===cb.dataset.email);return s+(x?.count||0);},0);document.getElementById('bulk-label').textContent=`${checked.length} sender${checked.length!==1?'s':''} selected`;document.getElementById('bulk-sub').textContent=`~${total} emails will be trashed`;bar.classList.add('visible');}
const App={
  saveClientId(){const v=document.getElementById('cid-input')?.value.trim();if(!v){toast('Paste your Client ID first');return;}Store.setClientId(v);render();},
  toggleTheme(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=t;Store.setTheme(t);document.getElementById('theme-meta').content=t==='dark'?'#1e293b':'#6366f1';refreshHeader();const s=UI.senders[UI.currentAcct];if(s){drawCharts(s,computeStats(s));}},
  async addAccount(){try{const{token,email}=await requestToken();if(email){Tokens[email]=Tokens['__p__']||Tokens[email];delete Tokens['__p__'];Store.addAccount(email);UI.currentAcct=email;render();toast(`Added ${email}`);}}catch(e){toast('Sign-in failed: '+e.message);}},
  switchAccount(email){if(!email)return;UI.currentAcct=email;UI.filter='all';UI.search='';UI.sort='count';render();},
  async scan(){const acct=UI.currentAcct;if(!acct){toast('Select an account first');return;}let token=getToken(acct);if(!token){toast('Re-authenticating…');try{const r=await requestToken(acct);token=r.token;Tokens[acct]={token,expiry:Date.now()+3540000};}catch(e){toast('Auth failed: '+e.message);return;}}UI.scanning=true;const prog=document.getElementById('scan-progress');const bar=document.getElementById('scan-bar');const txt=document.getElementById('scan-text');prog.classList.add('visible');document.getElementById('scan-btn').style.display='none';try{const senders=await getSenders(token,500,(done,total)=>{bar.style.width=Math.round(done/total*100)+'%';txt.textContent=`Scanning ${done} / ${total}…`;});UI.senders[acct]=annotateSenders(senders);UI.filter='all';UI.search='';UI.sort='count';render();toast(`Found ${senders.length} senders across ${senders.reduce((a,s)=>a+s.count,0)} emails`);}catch(e){if(e.code===401){delete Tokens[acct];toast('Session expired — scan again');}else toast('Scan failed: '+e.message);}finally{UI.scanning=false;prog.classList.remove('visible');bar.style.width='0%';refreshHeader();}},
  setFilter(f){UI.filter=f;render();},
  setSearch(v){UI.search=v;render();},
  setSort(v){UI.sort=v;render();},
  quickFilter(f){UI.filter=f;UI.search='';render();setTimeout(()=>document.getElementById('sender-rows')?.scrollIntoView({behavior:'smooth',block:'start'}),100);},
  selectAllVisible(){const visible=getVisible(UI.senders[UI.currentAcct]||[]).map(s=>s.email);document.querySelectorAll('.row-cb').forEach(cb=>{cb.checked=visible.includes(cb.dataset.email);});updateBulkBar();},
  clearSelection(){document.querySelectorAll('.row-cb:checked').forEach(cb=>cb.checked=false);updateBulkBar();},
  async trashOne(email,btn){const token=getToken(UI.currentAcct);if(!token){toast('Session expired — scan again');return;}if(!confirm(`Trash all emails from\n${email}?`))return;btn.disabled=true;btn.textContent='…';try{const n=await trashThreadsFrom(token,email);toast(`Trashed ${n} email${n!==1?'s':''} from ${email}`);if(UI.senders[UI.currentAcct])UI.senders[UI.currentAcct]=UI.senders[UI.currentAcct].filter(s=>s.email!==email);const row=document.getElementById(`row-${safeId(email)}`);if(row){row.classList.add('fading');setTimeout(()=>row.remove(),400);}}catch(e){toast('Error: '+e.message);btn.disabled=false;btn.textContent='Trash';}},
  async trashSelected(){const checked=[...document.querySelectorAll('.row-cb:checked')];if(!checked.length)return;const token=getToken(UI.currentAcct);if(!token){toast('Session expired — scan again');return;}if(!confirm(`Trash emails from ${checked.length} sender(s)?`))return;App.clearSelection();let total=0;for(const cb of checked){try{const n=await trashThreadsFrom(token,cb.dataset.email);total+=n;if(UI.senders[UI.currentAcct])UI.senders[UI.currentAcct]=UI.senders[UI.currentAcct].filter(s=>s.email!==cb.dataset.email);const row=document.getElementById(`row-${safeId(cb.dataset.email)}`);if(row){row.classList.add('fading');setTimeout(()=>row.remove(),400);}}catch(e){toast('Error: '+e.message);}}toast(`Trashed ${total} emails from ${checked.length} sender${checked.length!==1?'s':''}`);setTimeout(render,500);}
};
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
</script>
</body>
